/* ===================== UI PRIMITIVES ===================== */
const Card = ({children,className=""}) =>
  <div className={"bg-forest-800 border border-forest-600/40 rounded-2xl shadow-lg "+className}>{children}</div>;
const Btn = ({children,onClick,variant="solid",type="button",className="",disabled}) => {
  const base="px-4 py-2 rounded-xl font-medium transition disabled:opacity-50 ";
  const styles={
    solid:"bg-brass hover:bg-brass-light text-forest-900",
    outline:"border border-brass text-brass hover:bg-brass hover:text-forest-900",

  return <button type={type} disabled={disabled} onClick={onClick} className={base+styles[variant]+" "+className}>{children}</button>;

/* ===================== AUTH ===================== */
function Login({ onIn }) {
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [msg,setMsg]=useState(""); const [mode,setMode]=useState("in");
  const go=async()=>{
    setMsg("...");
    if(!sb){ setMsg("Backend not configured yet."); return; }
    const fn = mode==="in" ? sb.auth.signInWithPassword({email,password:pw})
                           : sb.auth.signUp({email,password:pw});
    const { error } = await fn;
    if(error) setMsg(error.message); else { setMsg(""); onIn&&onIn(); }
  };
  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      <Card className="p-8 w-full max-w-md text-center">
        <div className="serif text-4xl text-brass mb-1">Massage Fit Life</div>
        <div className="text-cream/60 mb-6 text-sm tracking-widest uppercase">Practitioner Portal</div>
        <Field label="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} />
        <Field label="Password" type="password" value={pw} onChange={e=>setPw(e.target.value)} />
        <Btn onClick={go} className="w-full mt-2">{mode==="in"?"Sign In":"Create Account"}</Btn>
        <div className="text-xs text-cream/50 mt-4 cursor-pointer hover:text-brass"
             onClick={()=>setMode(mode==="in"?"up":"in")}>
          {mode==="in"?"First time? Create your account":"Have an account? Sign in"}
        </div>
        {msg && <div className="text-brass-light text-sm mt-3">{msg}</div>}
      </Card>
    </div>
  );
}

  useEffect(()=>{(async()=>{

    const c=await sb.from("mfl_clients").select("id",{count:"exact",head:true});
    const cl=await sb.from("mfl_claims").select("status",{count:"exact"});
    const drafts=(cl.data||[]).filter(x=>x.status==="draft").length;

/* ===================== CLIENTS ===================== */

/* ===================== CLIENT DETAIL: intake + SOAP ===================== */
function ClientDetail({client,back}) {
  const [tab,setTab]=useState("intake");
  const [intake,setIntake]=useState({history:"",conditions:"",medications:"",goals:"",consent:false});
  const [notes,setNotes]=useState([]);
  const [soap,setSoap]=useState({visit_date:new Date().toISOString().slice(0,10),s:"",o:"",a:"",p:"",areas:"",modalities:""});
  useEffect(()=>{(async()=>{ if(!sb)return;
    const i=await sb.from("mfl_intake").select("*").eq("client_id",client.id).maybeSingle();
    if(i.data) setIntake(i.data);
    const n=await sb.from("mfl_soap").select("*").eq("client_id",client.id).order("visit_date",{ascending:false});
    setNotes(n.data||[]);
  })()},[client.id]);
  const saveIntake=async()=>{ if(!sb)return;
    await sb.from("mfl_intake").upsert({...intake,client_id:client.id},{onConflict:"client_id"});
    alert("Intake saved."); };
  const saveSoap=async()=>{ if(!sb)return;
    await sb.from("mfl_soap").insert({...soap,client_id:client.id});
    const n=await sb.from("mfl_soap").select("*").eq("client_id",client.id).order("visit_date",{ascending:false});
    setNotes(n.data||[]); setSoap({visit_date:new Date().toISOString().slice(0,10),s:"",o:"",a:"",p:"",areas:"",modalities:""}); };
  return (<div>
    <div className="text-brass cursor-pointer mb-3" onClick={back}>← Clients</div>
    <h1 className="serif text-4xl mb-1">{client.first_name} {client.last_name}</h1>
    <p className="text-cream/60 mb-6">{client.phone} · {client.insurer||"No insurer on file"} {client.member_id?("· "+client.member_id):""}</p>
    <div className="flex gap-2 mb-5">
      {[["intake","Intake"],["soap","SOAP Notes"]].map(([k,l])=>
        <div key={k} onClick={()=>setTab(k)} className={"px-4 py-2 rounded-lg cursor-pointer "+(tab===k?"bg-brass text-forest-900":"bg-forest-700 text-cream/70")}>{l}</div>)}
    </div>
    {tab==="intake" && <Card className="p-6 max-w-3xl">
      <Area label="Medical history" value={intake.history} onChange={e=>setIntake({...intake,history:e.target.value})}/>
      <Area label="Current conditions / injuries" value={intake.conditions} onChange={e=>setIntake({...intake,conditions:e.target.value})}/>
      <Area label="Medications" value={intake.medications} onChange={e=>setIntake({...intake,medications:e.target.value})}/>
      <Area label="Wellness goals" value={intake.goals} onChange={e=>setIntake({...intake,goals:e.target.value})}/>
      <label className="flex items-center gap-2 my-3 text-sm text-cream/70">
        <input type="checkbox" checked={intake.consent} onChange={e=>setIntake({...intake,consent:e.target.checked})}/> Consent to treat on file</label>
      <Btn onClick={saveIntake}>Save Intake</Btn>
    </Card>}
    {tab==="soap" && <div className="max-w-3xl">
      <Card className="p-6 mb-5">
        <Field label="Visit date" type="date" value={soap.visit_date} onChange={e=>setSoap({...soap,visit_date:e.target.value})}/>
        <Area label="Subjective" value={soap.s} onChange={e=>setSoap({...soap,s:e.target.value})}/>
        <Area label="Objective" value={soap.o} onChange={e=>setSoap({...soap,o:e.target.value})}/>
        <Area label="Assessment" value={soap.a} onChange={e=>setSoap({...soap,a:e.target.value})}/>
        <Area label="Plan" value={soap.p} onChange={e=>setSoap({...soap,p:e.target.value})}/>
        <Field label="Areas treated" value={soap.areas} onChange={e=>setSoap({...soap,areas:e.target.value})}/>
        <Field label="Modalities" value={soap.modalities} onChange={e=>setSoap({...soap,modalities:e.target.value})}/>
        <Btn onClick={saveSoap}>Save Note</Btn>
      </Card>
      {notes.map(n=>(<Card key={n.id} className="p-4 mb-3">
        <div className="text-brass font-medium">{n.visit_date}</div>
        <div className="text-sm text-cream/70 mt-1"><b>S:</b> {n.s} <b>O:</b> {n.o} <b>A:</b> {n.a} <b>P:</b> {n.p}</div>
      </Card>))}
    </div>}
  </div>);
}

/* ===================== SUPERBILL / CMS-1500 ===================== */
function Superbill() {
  const [clients,setClients]=useState([]);
  const [clientId,setClientId]=useState("");
  const [dos,setDos]=useState(new Date().toISOString().slice(0,10));
  const [dx,setDx]=useState([ICD[0].code]);
  const [lines,setLines]=useState([{cpt:"97124",units:1,charge:90,pointer:"A"}]);
  const [npi,setNpi]=useState(PRACTICE.npi);
  const [saved,setSaved]=useState(false);
  useEffect(()=>{(async()=>{ if(!sb)return; const {data}=await sb.from("mfl_clients").select("*").order("last_name"); setClients(data||[]); })()},[]);
  const client=clients.find(c=>c.id===clientId);
  const total=lines.reduce((s,l)=>s+(Number(l.charge)*Number(l.units||1)),0);
  const ptrLetters=["A","B","C","D"];
  const addLine=()=>setLines([...lines,{cpt:"97140",units:1,charge:90,pointer:"A"}]);
  const setLine=(i,k,v)=>setLines(lines.map((l,j)=>j===i?{...l,[k]:v}:l));
  const setCpt=(i,code)=>{ const c=CPT.find(x=>x.code===code); setLines(lines.map((l,j)=>j===i?{...l,cpt:code,charge:c?c.charge:l.charge}:l)); };
  const addDx=()=>{ if(dx.length<4) setDx([...dx,ICD[dx.length].code]); };

  const review=async()=>{
    if(!sb||!client){alert("Pick a client first.");return;}
    const { error }=await sb.from("mfl_claims").insert({
      client_id:client.id, dos, npi, diagnosis_codes:dx,
      line_items:lines, total, status:"reviewed", reviewed_by:PRACTICE.provider
    });
    if(error){alert(error.message);return;}
    setSaved(true); alert("Superbill saved & marked reviewed. You can export the CMS-1500 now.");
  };

  const exportPDF=()=>{
    const { jsPDF }=window.jspdf; const d=new jsPDF();
    d.setFontSize(16); d.setTextColor(20); d.text("Health Insurance Claim Form (CMS-1500)",14,18);
    d.setFontSize(9); d.text("Superbill — "+PRACTICE.name,14,25);
    d.setFontSize(10);
    let y=36;
    const row=(l,v)=>{ d.setFont(undefined,"bold"); d.text(l,14,y); d.setFont(undefined,"normal"); d.text(String(v||""),70,y); y+=7; };
    d.setFont(undefined,"bold"); d.text("PROVIDER",14,y); y+=6; d.setFont(undefined,"normal");
    row("Name", PRACTICE.provider);
    row("Practice", PRACTICE.name);
    row("License", PRACTICE.license);
    row("NPI", npi||"(add NPI)");
    row("Address", PRACTICE.address+", "+PRACTICE.city+", "+PRACTICE.state+" "+PRACTICE.zip);
    row("Phone", PRACTICE.phone);
    y+=3; d.setFont(undefined,"bold"); d.text("PATIENT",14,y); y+=6; d.setFont(undefined,"normal");
    row("Name", (client.first_name||"")+" "+(client.last_name||""));
    row("DOB", client.dob);
    row("Address", (client.address||"")+", "+(client.city||"")+", "+(client.state||"")+" "+(client.zip||""));
    row("Insurer", client.insurer);
    row("Member ID", client.member_id);
    row("Date of service", dos);
    y+=3; d.setFont(undefined,"bold");
    d.text("DIAGNOSIS (ICD-10): "+dx.map((c,i)=>ptrLetters[i]+". "+c).join("   "),14,y); y+=4;
    d.autoTable({
      startY:y+2,
      head:[["CPT","Description","Dx","Units","Charge","Line Total"]],
      body:lines.map(l=>{ const c=CPT.find(x=>x.code===l.cpt);
        return [l.cpt, c?c.desc:"", l.pointer, l.units, "$"+Number(l.charge).toFixed(2), "$"+(Number(l.charge)*Number(l.units)).toFixed(2)]; }),
      styles:{fontSize:9}, headStyles:{fillColor:[39,81,58]}
    });
    let yy=d.lastAutoTable.finalY+8;
    d.setFont(undefined,"bold"); d.text("TOTAL CHARGES: $"+total.toFixed(2),14,yy);
    d.setFont(undefined,"normal"); d.setFontSize(8); d.setTextColor(120);
    d.text("Reviewed & approved by "+PRACTICE.provider+" — this superbill is provided for insurance reimbursement. Generated by Blue Hippo Cyber portal.",14,yy+8,{maxWidth:180});
    d.save("superbill_"+(client.last_name||"client")+"_"+dos+".pdf");
  };

  return (<div className="max-w-4xl">
    <h1 className="serif text-4xl mb-1">New Superbill</h1>
    <p className="text-cream/60 mb-6">Confirm the details, review, then export a clean CMS-1500. Nothing is final until you approve it.</p>
    <Card className="p-6 mb-5">
      <div className="grid grid-cols-2 gap-x-5">
        <label className="block mb-3"><span className="text-xs uppercase tracking-wide text-cream/60">Client</span>
          <select value={clientId} onChange={e=>setClientId(e.target.value)} className="mt-1 w-full bg-forest-900 border border-forest-600/50 rounded-lg px-3 py-2 focus:border-brass outline-none">
            <option value="">— select —</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
          </select></label>
        <Field label="Date of service" type="date" value={dos} onChange={e=>setDos(e.target.value)}/>
        <Field label="NPI" value={npi} onChange={e=>setNpi(e.target.value)} placeholder="Provider NPI"/>
      </div>
    </Card>

    <Card className="p-6 mb-5">
      <div className="flex justify-between items-center mb-3"><h2 className="serif text-2xl text-brass">Diagnosis (ICD-10)</h2>
        <Btn variant="outline" onClick={addDx}>+ Add Dx</Btn></div>
      {dx.map((code,i)=>(
        <div key={i} className="flex items-center gap-3 mb-2">
          <span className="text-brass w-6">{ptrLetters[i]}.</span>
          <select value={code} onChange={e=>setDx(dx.map((c,j)=>j===i?e.target.value:c))}
            className="flex-1 bg-forest-900 border border-forest-600/50 rounded-lg px-3 py-2 focus:border-brass outline-none">
            {ICD.map(x=><option key={x.code} value={x.code}>{x.code} — {x.desc}</option>)}
          </select>
        </div>
      ))}
    </Card>

    <Card className="p-6 mb-5">
      <div className="flex justify-between items-center mb-3"><h2 className="serif text-2xl text-brass">Services (CPT)</h2>
        <Btn variant="outline" onClick={addLine}>+ Add Line</Btn></div>
      {lines.map((l,i)=>(
        <div key={i} className="grid grid-cols-12 gap-2 mb-2 items-center">
          <select value={l.cpt} onChange={e=>setCpt(i,e.target.value)} className="col-span-5 bg-forest-900 border border-forest-600/50 rounded-lg px-2 py-2 text-sm focus:border-brass outline-none">
            {CPT.map(x=><option key={x.code} value={x.code}>{x.code} — {x.desc}</option>)}
          </select>
          <select value={l.pointer} onChange={e=>setLine(i,"pointer",e.target.value)} className="col-span-2 bg-forest-900 border border-forest-600/50 rounded-lg px-2 py-2 text-sm">
            {dx.map((_,j)=><option key={j} value={ptrLetters[j]}>Dx {ptrLetters[j]}</option>)}
          </select>
          <input type="number" value={l.units} onChange={e=>setLine(i,"units",e.target.value)} className="col-span-2 bg-forest-900 border border-forest-600/50 rounded-lg px-2 py-2 text-sm" placeholder="Units"/>
          <input type="number" value={l.charge} onChange={e=>setLine(i,"charge",e.target.value)} className="col-span-2 bg-forest-900 border border-forest-600/50 rounded-lg px-2 py-2 text-sm" placeholder="Charge"/>
          <span className="col-span-1 text-cream/50 text-xs cursor-pointer" onClick={()=>setLines(lines.filter((_,j)=>j!==i))}>✕</span>
        </div>
      ))}
      <div className="text-right serif text-2xl text-brass mt-3">Total: ${total.toFixed(2)}</div>
    </Card>

    <div className="flex gap-3">
      <Btn onClick={review}>Review & Save</Btn>
      <Btn variant="outline" onClick={exportPDF} disabled={!client}>Export CMS-1500 PDF</Btn>
    </div>
  </div>);
}

/* ===================== CLAIMS LIST ===================== */
function Claims() {
  const [rows,setRows]=useState([]);
  useEffect(()=>{(async()=>{ if(!sb)return;
    const {data}=await sb.from("mfl_claims").select("*, mfl_clients(first_name,last_name)").order("created_at",{ascending:false});
    setRows(data||[]); })()},[]);
  return (<div>
    <h1 className="serif text-4xl mb-6">Superbills & Claims</h1>
    <Card className="p-2">
      {rows.length===0 && <div className="p-6 text-cream/50">No superbills yet.</div>}
      {rows.map(r=>(
        <div key={r.id} className="flex justify-between items-center px-4 py-3 hover:bg-forest-700 rounded-lg">
          <div><span className="font-medium">{r.mfl_clients?.first_name} {r.mfl_clients?.last_name}</span>
            <span className="text-cream/40 text-sm ml-3">DOS {r.dos}</span></div>
          <div className="flex items-center gap-4">
            <span className="serif text-brass text-lg">${Number(r.total).toFixed(2)}</span>
            <span className="text-xs px-2 py-1 rounded bg-forest-600/50 uppercase tracking-wide">{r.status}</span>
          </div>
        </div>
      ))}
    </Card>
  </div>);
}

/* ===================== ROOT ===================== */
function App() {
  const [session,setSession]=useState(null);
  const [ready,setReady]=useState(false);
  useEffect(()=>{ if(!sb){setReady(true);return;}
    sb.auth.getSession().then(({data})=>{setSession(data.session);setReady(true);});
    const {data:sub}=sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  const signOut=async()=>{ if(sb) await sb.auth.signOut(); setSession(null); };
  if(!ready) return <div className="min-h-screen flex items-center justify-center text-brass serif text-2xl">Loading…</div>;
  if(!session) return <Login onIn={()=>sb.auth.getSession().then(({data})=>setSession(data.session))}/>;
  return <Shell session={session} signOut={signOut}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
