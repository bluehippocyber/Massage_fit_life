function useIdleTimer(signOut,timeout=15*60*1000){
  const timer=useRef(null);const warnTimer=useRef(null);const countRef=useRef(null);
  const [warning,setWarning]=useState(false);const [countdown,setCountdown]=useState(120);
  const reset=useCallback(()=>{
    setWarning(false);
    clearTimeout(timer.current);clearTimeout(warnTimer.current);clearInterval(countRef.current);
    warnTimer.current=setTimeout(()=>{
      setWarning(true);setCountdown(120);
      countRef.current=setInterval(()=>setCountdown(c=>{if(c<=1){clearInterval(countRef.current);return 0;}return c-1;}),1000);
    },timeout-2*60*1000);
    timer.current=setTimeout(()=>signOut(),timeout);
  },[signOut,timeout]);
  useEffect(()=>{
    const ev=['mousedown','keydown','touchstart','scroll'];
    const h=()=>reset();
    ev.forEach(e=>document.addEventListener(e,h,{passive:true}));
    reset();
    return()=>{ev.forEach(e=>document.removeEventListener(e,h));clearTimeout(timer.current);clearTimeout(warnTimer.current);clearInterval(countRef.current);};
  },[reset]);
  return{warning,countdown,resetTimer:reset};
}

      </div>

    </div>
  );
}

/* ===================== AUTH ===================== */
function Login({onIn}) {
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [msg,setMsg]=useState(""); const [mode,setMode]=useState("in");
  const [attempts,setAttempts]=useState(0); const [locked,setLocked]=useState(false);

  const pwStrength=useMemo(()=>{
    if(!pw||pw.length<1) return {score:0,label:"",color:""};
    let s=0;
    if(pw.length>=8) s++;
    if(/[A-Z]/.test(pw)) s++;
    if(/[0-9]/.test(pw)) s++;
    if(/[^A-Za-z0-9]/.test(pw)) s++;
    const map=["","Weak","Fair","Good","Strong"];
    const col=["","bg-red-500","bg-yellow-500","bg-blue-500","bg-green-500"];
    return{score:s,label:map[s]||"Weak",color:col[s]||"bg-red-500"};
  },[pw]);

  const go=async()=>{
    if(locked){setMsg("Too many failed attempts — wait 30 seconds.");return;}
    setMsg("...");
    if(!sb){setMsg("Backend not configured yet.");return;}
    const fn=mode==="in"?sb.auth.signInWithPassword({email,password:pw}):sb.auth.signUp({email,password:pw});
    const{error}=await fn;
    if(error){
      const next=attempts+1; setAttempts(next);
      if(next>=3){
        setLocked(true);
        setMsg("Too many failed attempts. Locked for 30 seconds.");
        setTimeout(()=>{setLocked(false);setAttempts(0);setMsg("");},30000);
      } else {
        setMsg(error.message+(next===2?" — 1 attempt remaining before lockout":""));
      }
    } else {setMsg("");onIn&&onIn();}
  };

  return(
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="w-full max-w-md">
        <Card className="p-8 text-center">
          <div className="serif text-4xl text-brass mb-1">Massage Fit Life</div>
          <div className="text-cream/60 text-sm tracking-widest uppercase mb-1">Practitioner Portal</div>
          <div className="flex items-center justify-center gap-1.5 text-green-400 text-xs mb-6">
            <span>🔒</span><span>Secure — HIPAA-compliant</span>
          </div>
          <Field label="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
          <Field label="Password" type="password" value={pw} onChange={e=>setPw(e.target.value)}/>
          {mode==="up"&&pw.length>0&&(
            <div className="mb-3 -mt-2 text-left">
              <div className="flex gap-1 mb-1">
                {[1,2,3,4].map(i=><div key={i} className={"h-1 flex-1 rounded "+(i<=pwStrength.score?pwStrength.color:"bg-forest-600")}/>)}
              </div>
              <span className="text-xs text-cream/50">{pwStrength.label}</span>
            </div>
          )}
          {locked&&<div className="text-xs text-red-400 mb-3">🔒 Account locked — wait 30 seconds</div>}
          <Btn onClick={go} className="w-full mt-2" disabled={locked}>{mode==="in"?"Sign In":"Create Account"}</Btn>
          <div className="text-xs text-cream/50 mt-4 cursor-pointer hover:text-brass" onClick={()=>setMode(mode==="in"?"up":"in")}>
            {mode==="in"?"First time? Create your account":"Have an account? Sign in"}
          </div>
          {msg&&msg!=="..."&&<div className="text-brass-light text-sm mt-3">{msg}</div>}
          {msg==="..."&&<div className="text-cream/40 text-sm mt-3">Checking…</div>}
        </Card>
        <div className="text-center text-xs text-cream/25 mt-4">Massage Fit Life · HIPAA-compliant portal</div>
      </div>
    </div>
  );
}

  const saveSoap=async()=>{ if(!sb)return;
    const provList=getProviders();
    const prov=provList.find(p=>p.id===soap.provider);
    const provLabel=prov?`Provider: ${prov.name}${prov.credentials?" ("+prov.credentials+")":""}`:""
    const sField=[soap.pain_before?`Pain before: ${soap.pain_before}/10`:"",soap.chief_complaint?`Chief complaint: ${soap.chief_complaint}`:"",soap.s].filter(Boolean).join("\n");
    const oField=[provLabel,soap.duration?`Duration: ${soap.duration} min`:"",soap.o].filter(Boolean).join("\n");
    const pField=[soap.frequency?`Frequency: ${soap.frequency}`:"",soap.homework?`Home care: ${soap.homework}`:"",soap.pain_after?`Pain after: ${soap.pain_after}/10`:"",soap.p].filter(Boolean).join("\n");
    await sb.from("mfl_soap").insert({
      client_id:client.id,visit_date:soap.visit_date,
      s:sField,o:oField,a:soap.a,p:pField,
      areas:soap.areas||(soap.regions||[]).join(", "),
      modalities:soap.modalities||[(soap.techniques||[]).join(", "),soap.duration?"("+soap.duration+" min)":""].filter(Boolean).join(" ")
    });
    const n=await sb.from("mfl_soap").select("*").eq("client_id",client.id).order("visit_date",{ascending:false});
    setNotes(n.data||[]); setSoap(blankSoap); };
  return (<div>
    <div className="text-brass cursor-pointer mb-3" onClick={back}>← Clients</div>
    <h1 className="serif text-4xl mb-1">{client.first_name} {client.last_name}</h1>
    <p className="text-cream/60 mb-6">{client.phone} · {client.insurer||"No insurer on file"} {client.member_id?("· "+client.member_id):""}</p>
    <div className="flex gap-2 mb-5">
      {[["intake","Intake"],["soap","SOAP Notes"],["consent","Consent"]].map(([k,l])=>
        <div key={k} onClick={()=>setTab(k)} className={"px-4 py-2 rounded-lg cursor-pointer "+(tab===k?"bg-brass text-forest-900":"bg-forest-700 text-cream/70")}>{l}</div>)}
    </div>
    {tab==="intake" && <Card className="p-6 max-w-3xl">
      <Area label="Medical history" value={intake.history} onChange={e=>setIntake({...intake,history:e.target.value})}/>
      <Area label="Current conditions / injuries" value={intake.conditions} onChange={e=>setIntake({...intake,conditions:e.target.value})}/>
      <Area label="Medications" value={intake.medications} onChange={e=>setIntake({...intake,medications:e.target.value})}/>
      <Area label="Wellness goals" value={intake.goals} onChange={e=>setIntake({...intake,goals:e.target.value})}/>
      <label className="flex items-center gap-2 my-3 text-sm text-cream/70">
        <input type="checkbox" checked={intake.consent} onChange={e=>setIntake({...intake,consent:e.target.checked})}/> Consent to treat on file</label>
      <Btn onClick={saveIntake}>Save Intake</Btn>
    </Card>}
    {tab==="consent" && <Card className="p-6 max-w-3xl">
      <h2 className="serif text-2xl text-brass mb-4">Consent Forms</h2>
      <div className="space-y-3 mb-5">
        <label className="flex items-start gap-3 text-sm text-cream/80">
          <input type="checkbox" className="mt-0.5" checked={consentForm.treat} onChange={e=>setConsentForm({...consentForm,treat:e.target.checked})}/>
          <span><b>Consent to Treatment:</b> I consent to receive massage therapy services from Desiree Dekle, LMT. I understand that massage therapy is not a substitute for medical treatment and that I should consult a physician for any medical concerns.</span>
        </label>
        <label className="flex items-start gap-3 text-sm text-cream/80">
          <input type="checkbox" className="mt-0.5" checked={consentForm.billing} onChange={e=>setConsentForm({...consentForm,billing:e.target.checked})}/>
          <span><b>Consent to Bill Insurance:</b> I authorize Massage Fit Life to submit insurance claims on my behalf to my insurer or VA/Optum, and to release any medical information necessary to process these claims.</span>
        </label>
        <label className="flex items-start gap-3 text-sm text-cream/80">
          <input type="checkbox" className="mt-0.5" checked={consentForm.cancel} onChange={e=>setConsentForm({...consentForm,cancel:e.target.checked})}/>
          <span><b>Cancellation Policy:</b> I understand that 24-hour notice is required to cancel or reschedule an appointment. Late cancellations or no-shows may be subject to a fee.</span>
        </label>
      </div>
      <Field label="Client Signature (type full name)" value={consentForm.signature} onChange={e=>setConsentForm({...consentForm,signature:e.target.value})} placeholder="Full legal name"/>
      <Field label="Date signed" type="date" value={consentForm.signed_date} onChange={e=>setConsentForm({...consentForm,signed_date:e.target.value})}/>
      <div className={`text-xs mt-2 mb-4 ${consentForm.treat&&consentForm.billing&&consentForm.cancel&&consentForm.signature?"text-green-400":"text-cream/40"}`}>
        {consentForm.treat&&consentForm.billing&&consentForm.cancel&&consentForm.signature?"✓ All consents on file":"Complete all fields to record consent"}
      </div>
      <Btn onClick={async()=>{ if(!sb)return; await sb.from("mfl_intake").upsert({...intake,client_id:client.id,consent_treat:consentForm.treat,consent_billing:consentForm.billing,consent_cancel:consentForm.cancel,consent_signature:consentForm.signature,consent_date:consentForm.signed_date},{onConflict:"client_id"}); alert("Consent recorded."); }}>Save Consent</Btn>
    </Card>}
    {tab==="soap" && <div className="max-w-3xl">
      {/* Template selector */}
      <Card className="p-5 mb-5">
        <h3 className="serif text-lg text-brass mb-3">Note Template</h3>
        <div className="flex gap-2 flex-wrap">
          {[["initial","Initial Assessment"],["followup","Follow-Up"],["va","VA / Insurance"],["blank","Blank"]].map(([k,l])=>(
            <button key={k} onClick={()=>{
              const t=NOTE_TEMPLATES[k];
              setSoap({...soap,template:k,...(t||{s:"",o:"",a:"",p:""})});
            }} className={"px-3 py-1.5 rounded-lg text-sm border transition "+(soap.template===k?"bg-brass text-forest-900 border-brass":"border-forest-600/60 text-cream/70 hover:border-brass hover:text-brass")}>{l}</button>
          ))}
          {notes.length>0&&<button onClick={()=>setSoap({...blankSoap,...notes[0],visit_date:new Date().toISOString().slice(0,10),id:undefined,template:"copy",regions:[],techniques:[]})} className="px-3 py-1.5 rounded-lg text-sm border border-forest-600/60 text-cream/70 hover:border-brass hover:text-brass transition">↩ Copy Last ({notes[0].visit_date})</button>}
        </div>
      </Card>

      <Card className="p-6 mb-5">
        {/* Header: date + provider */}
        <div className="grid grid-cols-2 gap-x-5 mb-5">
          <Field label="Visit date" type="date" value={soap.visit_date} onChange={e=>setSoap({...soap,visit_date:e.target.value})}/>
          <label className="block mb-3">
            <span className="text-xs uppercase tracking-wide text-cream/60">Provider</span>
            <select value={soap.provider} onChange={e=>setSoap({...soap,provider:e.target.value})} className="mt-1 w-full bg-forest-900 border border-forest-600/50 rounded-lg px-3 py-2 focus:border-brass outline-none">
              <option value="">Desiree Dekle, LMT (default)</option>
              {getProviders().map(p=><option key={p.id} value={p.id}>{p.name}{p.credentials?" · "+p.credentials:""}</option>)}
            </select>
          </label>
        </div>

        {/* S — Subjective */}
        <div className="mb-6 pl-4 border-l-2 border-brass/40">
          <div className="text-xs font-bold uppercase tracking-widest text-brass mb-3">S — Subjective</div>
          <div className="grid grid-cols-2 gap-x-4 mb-3">
            <label className="block">
              <span className="text-xs uppercase tracking-wide text-cream/60">Pain before session (0–10)</span>
              <div className="flex items-center gap-3 mt-2">
                <input type="range" min="0" max="10" value={soap.pain_before} onChange={e=>setSoap({...soap,pain_before:e.target.value})} className="flex-1 accent-brass"/>
                <span className="text-brass font-bold text-lg w-6 text-center">{soap.pain_before}</span>
              </div>
            </label>
            <label className="block">
              <span className="text-xs uppercase tracking-wide text-cream/60">Pain after session (0–10)</span>
              <div className="flex items-center gap-3 mt-2">
                <input type="range" min="0" max="10" value={soap.pain_after||0} onChange={e=>setSoap({...soap,pain_after:e.target.value})} className="flex-1 accent-brass"/>
                <span className="text-brass font-bold text-lg w-6 text-center">{soap.pain_after||0}</span>
              </div>
            </label>
          </div>
          <Field label="Chief complaint" value={soap.chief_complaint} onChange={e=>setSoap({...soap,chief_complaint:e.target.value})} placeholder="Client's primary reason for visit"/>
          <Area label="Subjective narrative" value={soap.s} onChange={e=>setSoap({...soap,s:e.target.value})} placeholder="Client's reported symptoms, history, goals…"/>
        </div>

        {/* O — Objective */}
        <div className="mb-6 pl-4 border-l-2 border-brass/40">
          <div className="text-xs font-bold uppercase tracking-widest text-brass mb-3">O — Objective</div>
          <label className="block mb-3">
            <span className="text-xs uppercase tracking-wide text-cream/60">Session duration</span>
            <select value={soap.duration} onChange={e=>setSoap({...soap,duration:e.target.value})} className="mt-1 w-full bg-forest-900 border border-forest-600/50 rounded-lg px-3 py-2 focus:border-brass outline-none">
              {["30","45","60","75","90","120"].map(d=><option key={d} value={d}>{d} minutes</option>)}
            </select>
          </label>
          <div className="mb-3">
            <span className="text-xs uppercase tracking-wide text-cream/60 block mb-2">Body regions treated</span>
            <div className="grid grid-cols-3 gap-x-3 gap-y-1">
              {BODY_REGIONS.map(r=>(
                <label key={r} className="flex items-center gap-1.5 text-xs text-cream/70 cursor-pointer hover:text-cream py-0.5">
                  <input type="checkbox" checked={(soap.regions||[]).includes(r)} onChange={e=>{
                    const cur=soap.regions||[];
                    const next=e.target.checked?[...cur,r]:cur.filter(x=>x!==r);
                    setSoap({...soap,regions:next,areas:next.join(", ")});
                  }} className="accent-brass"/>{r}
                </label>
              ))}
            </div>
          </div>
          <div className="mb-3">
            <span className="text-xs uppercase tracking-wide text-cream/60 block mb-2">Techniques applied</span>
            <div className="grid grid-cols-3 gap-x-3 gap-y-1">
              {TECHNIQUE_OPTIONS.map(t=>(
                <label key={t} className="flex items-center gap-1.5 text-xs text-cream/70 cursor-pointer hover:text-cream py-0.5">
                  <input type="checkbox" checked={(soap.techniques||[]).includes(t)} onChange={e=>{
                    const cur=soap.techniques||[];
                    const next=e.target.checked?[...cur,t]:cur.filter(x=>x!==t);
                    setSoap({...soap,techniques:next,modalities:next.join(", ")});
                  }} className="accent-brass"/>{t}
                </label>
              ))}
            </div>
          </div>
          <Area label="Clinical observations" value={soap.o} onChange={e=>setSoap({...soap,o:e.target.value})} placeholder="Tissue quality, posture, ROM, palpation findings…"/>
        </div>

        {/* A — Assessment */}
        <div className="mb-6 pl-4 border-l-2 border-brass/40">
          <div className="text-xs font-bold uppercase tracking-widest text-brass mb-3">A — Assessment</div>
          <Area label="Clinical assessment" value={soap.a} onChange={e=>setSoap({...soap,a:e.target.value})} placeholder="Clinical impression, treatment response, progress toward goals…"/>
        </div>

        {/* P — Plan */}
        <div className="mb-5 pl-4 border-l-2 border-brass/40">
          <div className="text-xs font-bold uppercase tracking-widest text-brass mb-3">P — Plan</div>
          <label className="block mb-3">
            <span className="text-xs uppercase tracking-wide text-cream/60">Recommended frequency</span>
            <select value={soap.frequency} onChange={e=>setSoap({...soap,frequency:e.target.value})} className="mt-1 w-full bg-forest-900 border border-forest-600/50 rounded-lg px-3 py-2 focus:border-brass outline-none">
              <option value="">— select —</option>
              {FREQ_OPTIONS.map(f=><option key={f} value={f}>{f}</option>)}
            </select>
          </label>
          <Field label="Home care / self-care instructions" value={soap.homework} onChange={e=>setSoap({...soap,homework:e.target.value})} placeholder="Stretches, ice/heat, exercises…"/>
          <Area label="Plan narrative" value={soap.p} onChange={e=>setSoap({...soap,p:e.target.value})} placeholder="Treatment plan, follow-up schedule, referrals…"/>
        </div>

        <Btn onClick={saveSoap}>Save Note</Btn>
      </Card>

      {/* Session history */}
      {notes.length>0&&<div>
        <h3 className="serif text-xl text-brass mb-3">Session History ({notes.length})</h3>
        {notes.map(n=>(<Card key={n.id} className="p-5 mb-3">
          <div className="flex justify-between items-start mb-2">
            <span className="text-brass font-medium text-lg">{n.visit_date}</span>
            {n.modalities&&<span className="text-xs text-cream/50 max-w-[55%] text-right">{n.modalities}</span>}
          </div>
          {n.areas&&<div className="text-xs text-cream/40 mb-2">Regions: {n.areas}</div>}
          <div className="space-y-1.5 text-sm">
            {n.s&&<div><span className="text-brass/70 font-semibold">S </span><span className="text-cream/80">{n.s}</span></div>}
            {n.o&&<div><span className="text-brass/70 font-semibold">O </span><span className="text-cream/80">{n.o}</span></div>}
            {n.a&&<div><span className="text-brass/70 font-semibold">A </span><span className="text-cream/80">{n.a}</span></div>}
            {n.p&&<div><span className="text-brass/70 font-semibold">P </span><span className="text-cream/80">{n.p}</span></div>}
          </div>
        </Card>))}
      </div>}
    </div>}
  </div>);
}

/* ===================== SUPERBILL / CMS-1500 ===================== */
function Superbill() {
  const [clients,setClients]=useState([]);
  const [clientId,setClientId]=useState("");
  const [dos,setDos]=useState(new Date().toISOString().slice(0,10));
  const [dx,setDx]=useState([ICD[0].code]);
  const [lines,setLines]=useState([{cpt:"97124",units:1,charge:90,pointer:"A"}]);
  const [npi,setNpi]=useState(PRACTICE.npi);
  const [saved,setSaved]=useState(false);
  useEffect(()=>{(async()=>{ if(!sb)return; const {data}=await sb.from("mfl_clients").select("*").order("last_name"); setClients(data||[]); })()},[]);
  const client=clients.find(c=>c.id===clientId);
  const total=lines.reduce((s,l)=>s+(Number(l.charge)*Number(l.units||1)),0);
  const ptrLetters=["A","B","C","D"];
  const addLine=()=>setLines([...lines,{cpt:"97140",units:1,charge:90,pointer:"A"}]);
  const setLine=(i,k,v)=>setLines(lines.map((l,j)=>j===i?{...l,[k]:v}:l));
  const setCpt=(i,code)=>{ const c=CPT.find(x=>x.code===code); setLines(lines.map((l,j)=>j===i?{...l,cpt:code,charge:c?c.charge:l.charge}:l)); };
  const addDx=()=>{ if(dx.length<4) setDx([...dx,ICD[dx.length].code]); };

  const review=async()=>{
    if(!sb||!client){alert("Pick a client first.");return;}
    const { error }=await sb.from("mfl_claims").insert({
      client_id:client.id, dos, npi, diagnosis_codes:dx,
      line_items:lines, total, status:"reviewed", reviewed_by:PRACTICE.provider
    });
    if(error){alert(error.message);return;}
    setSaved(true); alert("Superbill saved & marked reviewed. You can export the CMS-1500 now.");
  };

  const exportPDF=()=>{
    const { jsPDF }=window.jspdf; const d=new jsPDF();
    d.setFontSize(16); d.setTextColor(20); d.text("Health Insurance Claim Form (CMS-1500)",14,18);
    d.setFontSize(9); d.text("Superbill — "+PRACTICE.name,14,25);
    d.setFontSize(10);
    let y=36;
    const row=(l,v)=>{ d.setFont(undefined,"bold"); d.text(l,14,y); d.setFont(undefined,"normal"); d.text(String(v||""),70,y); y+=7; };
    d.setFont(undefined,"bold"); d.text("PROVIDER",14,y); y+=6; d.setFont(undefined,"normal");
    row("Name", PRACTICE.provider);
    row("Practice", PRACTICE.name);
    row("License", PRACTICE.license);
    row("NPI", npi||"(add NPI)");
    row("Address", PRACTICE.address+", "+PRACTICE.city+", "+PRACTICE.state+" "+PRACTICE.zip);
    row("Phone", PRACTICE.phone);
    y+=3; d.setFont(undefined,"bold"); d.text("PATIENT",14,y); y+=6; d.setFont(undefined,"normal");
    row("Name", (client.first_name||"")+" "+(client.last_name||""));
    row("DOB", client.dob);
    row("Address", (client.address||"")+", "+(client.city||"")+", "+(client.state||"")+" "+(client.zip||""));
    row("Insurer", client.insurer);
    row("Member ID", client.member_id);
    row("Date of service", dos);
    y+=3; d.setFont(undefined,"bold");
    d.text("DIAGNOSIS (ICD-10): "+dx.map((c,i)=>ptrLetters[i]+". "+c).join("   "),14,y); y+=4;
    d.autoTable({
      startY:y+2,
      head:[["CPT","Description","Dx","Units","Charge","Line Total"]],
      body:lines.map(l=>{ const c=CPT.find(x=>x.code===l.cpt);
        return [l.cpt, c?c.desc:"", l.pointer, l.units, "$"+Number(l.charge).toFixed(2), "$"+(Number(l.charge)*Number(l.units)).toFixed(2)]; }),
      styles:{fontSize:9}, headStyles:{fillColor:[39,81,58]}
    });
    let yy=d.lastAutoTable.finalY+8;
    d.setFont(undefined,"bold"); d.text("TOTAL CHARGES: $"+total.toFixed(2),14,yy);
    d.setFont(undefined,"normal"); d.setFontSize(8); d.setTextColor(120);
    d.text("Reviewed & approved by "+PRACTICE.provider+" — this superbill is provided for insurance reimbursement purposes. Massage Fit Life Clinical Portal.",14,yy+8,{maxWidth:180});
    d.save("superbill_"+(client.last_name||"client")+"_"+dos+".pdf");
  };

  return (<div className="max-w-4xl">
    <h1 className="serif text-4xl mb-1">New Superbill</h1>
    <p className="text-cream/60 mb-6">Confirm the details, review, then export a clean CMS-1500. Nothing is final until you approve it.</p>
    <Card className="p-6 mb-5">
      <div className="grid grid-cols-2 gap-x-5">
        <label className="block mb-3"><span className="text-xs uppercase tracking-wide text-cream/60">Client</span>
          <select value={clientId} onChange={e=>setClientId(e.target.value)} className="mt-1 w-full bg-forest-900 border border-forest-600/50 rounded-lg px-3 py-2 focus:border-brass outline-none">
            <option value="">— select —</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
          </select></label>
        <Field label="Date of service" type="date" value={dos} onChange={e=>setDos(e.target.value)}/>
        <Field label="NPI" value={npi} onChange={e=>setNpi(e.target.value)} placeholder="Provider NPI"/>
      </div>
    </Card>

    <Card className="p-6 mb-5">
      <div className="flex justify-between items-center mb-3"><h2 className="serif text-2xl text-brass">Diagnosis (ICD-10)</h2>
        <Btn variant="outline" onClick={addDx}>+ Add Dx</Btn></div>
      {dx.map((code,i)=>(
        <div key={i} className="flex items-center gap-3 mb-2">
          <span className="text-brass w-6">{ptrLetters[i]}.</span>
          <select value={code} onChange={e=>setDx(dx.map((c,j)=>j===i?e.target.value:c))}
            className="flex-1 bg-forest-900 border border-forest-600/50 rounded-lg px-3 py-2 focus:border-brass outline-none">
            {ICD.map(x=><option key={x.code} value={x.code}>{x.code} — {x.desc}</option>)}
          </select>
        </div>
      ))}
    </Card>

    <Card className="p-6 mb-5">
      <div className="flex justify-between items-center mb-3"><h2 className="serif text-2xl text-brass">Services (CPT)</h2>
        <Btn variant="outline" onClick={addLine}>+ Add Line</Btn></div>
      {lines.map((l,i)=>(
        <div key={i} className="grid grid-cols-12 gap-2 mb-2 items-center">
          <select value={l.cpt} onChange={e=>setCpt(i,e.target.value)} className="col-span-5 bg-forest-900 border border-forest-600/50 rounded-lg px-2 py-2 text-sm focus:border-brass outline-none">
            {CPT.map(x=><option key={x.code} value={x.code}>{x.code} — {x.desc}</option>)}
          </select>
          <select value={l.pointer} onChange={e=>setLine(i,"pointer",e.target.value)} className="col-span-2 bg-forest-900 border border-forest-600/50 rounded-lg px-2 py-2 text-sm">
            {dx.map((_,j)=><option key={j} value={ptrLetters[j]}>Dx {ptrLetters[j]}</option>)}
          </select>
          <input type="number" value={l.units} onChange={e=>setLine(i,"units",e.target.value)} className="col-span-2 bg-forest-900 border border-forest-600/50 rounded-lg px-2 py-2 text-sm" placeholder="Units"/>
          <input type="number" value={l.charge} onChange={e=>setLine(i,"charge",e.target.value)} className="col-span-2 bg-forest-900 border border-forest-600/50 rounded-lg px-2 py-2 text-sm" placeholder="Charge"/>
          <span className="col-span-1 text-cream/50 text-xs cursor-pointer" onClick={()=>setLines(lines.filter((_,j)=>j!==i))}>✕</span>
        </div>
      ))}
      <div className="text-right serif text-2xl text-brass mt-3">Total: ${total.toFixed(2)}</div>
    </Card>

    <div className="flex gap-3">
      <Btn onClick={review}>Review & Save</Btn>
      <Btn variant="outline" onClick={exportPDF} disabled={!client}>Export CMS-1500 PDF</Btn>
    </div>
  </div>);
}

/* ===================== REPORTS ===================== */
function Reports() {
  const [rows,setRows]=useState([]); const [clients,setClients]=useState([]);
  useEffect(()=>{(async()=>{ if(!sb)return;
    const cl=await sb.from("mfl_claims").select("*, mfl_clients(first_name,last_name)").order("created_at",{ascending:false});
    setRows(cl.data||[]);
    const c=await sb.from("mfl_clients").select("*").order("last_name");
    setClients(c.data||[]);
  })()},[]);
  const total=rows.reduce((s,r)=>s+Number(r.total||0),0);
  const avg=rows.length?total/rows.length:0;
  const byClient={};
  rows.forEach(r=>{ const k=r.client_id;
    if(!byClient[k]) byClient[k]={name:(r.mfl_clients?.first_name||"")+" "+(r.mfl_clients?.last_name||""),count:0,total:0};
    byClient[k].count++; byClient[k].total+=Number(r.total||0); });

  const exportCSV=()=>{
    const h=["ID","First","Last","DOB","Phone","Email","Address","City","State","ZIP","Insurer","Member ID"];
    const r=clients.map(c=>[c.id,c.first_name,c.last_name,c.dob,c.phone,c.email,c.address,c.city,c.state,c.zip,c.insurer,c.member_id]);
    const csv=[h,...r].map(row=>row.map(v=>JSON.stringify(v??"")||'""').join(",")).join("\n");
    const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download="mfl_clients_"+new Date().toISOString().slice(0,10)+".csv"; a.click();
  };
  const exportClaimCSV=()=>{
    const h=["Client","Date of Service","Total","Status"];
    const r=rows.map(r=>[(r.mfl_clients?.first_name||"")+" "+(r.mfl_clients?.last_name||""),r.dos,r.total,r.status]);
    const csv=[h,...r].map(row=>row.map(v=>JSON.stringify(v??"")||'""').join(",")).join("\n");
    const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download="mfl_claims_"+new Date().toISOString().slice(0,10)+".csv"; a.click();
  };

  const monthly=useMemo(()=>{
    const m={};
    rows.forEach(r=>{
      const key=(r.dos||"").slice(0,7); if(!key) return;
      m[key]=(m[key]||0)+Number(r.total||0);
    });
    return Object.entries(m).sort(([a],[b])=>a.localeCompare(b)).slice(-6);
  },[rows]);
  const chartMax=Math.max(...monthly.map(([,v])=>v),1);

  return (<div>
    <div className="flex justify-between items-center mb-6">
      <h1 className="serif text-4xl">Reports</h1>
      <div className="flex gap-2">
        <Btn variant="outline" onClick={exportCSV}>Export Clients CSV</Btn>
        <Btn variant="outline" onClick={exportClaimCSV}>Export Claims CSV</Btn>
      </div>
    </div>
    {monthly.length>0&&<Card className="p-6 mb-6">
      <h2 className="serif text-2xl text-brass mb-5">Monthly Revenue</h2>
      <div className="flex items-end gap-3" style={{height:'140px'}}>
        {monthly.map(([month,val])=>(
          <div key={month} className="flex-1 flex flex-col items-center justify-end h-full gap-1">
            <div className="text-xs text-brass font-medium">${val}</div>
            <div className="w-full rounded-t" style={{height:`${Math.max((val/chartMax)*100,4)}px`,background:'linear-gradient(to top,#8f6f3a,#c7a96b)'}}></div>
            <div className="text-[10px] text-cream/40 mt-1">{month.slice(5)}</div>
          </div>
        ))}
      </div>
    </Card>}
    <div className="grid grid-cols-3 gap-5 mb-8">
      <Card className="p-6"><div className="serif text-4xl text-brass">${total.toFixed(2)}</div><div className="text-cream/60 mt-1">Total Billed (all time)</div></Card>
      <Card className="p-6"><div className="serif text-4xl text-brass">{rows.length}</div><div className="text-cream/60 mt-1">Total Superbills</div></Card>
      <Card className="p-6"><div className="serif text-4xl text-brass">${avg.toFixed(2)}</div><div className="text-cream/60 mt-1">Avg Per Session</div></Card>
    </div>
    <Card className="p-6 mb-6">
      <h2 className="serif text-2xl text-brass mb-4">Revenue by Client</h2>
      {Object.values(byClient).sort((a,b)=>b.total-a.total).map((c,i)=>(
        <div key={i} className="flex justify-between items-center py-2 border-b border-forest-600/30 last:border-0">
          <div><span className="font-medium">{c.name}</span><span className="text-cream/40 text-sm ml-2">({c.count} superbills)</span></div>
          <span className="serif text-brass">${c.total.toFixed(2)}</span>
        </div>
      ))}
      {Object.keys(byClient).length===0 && <div className="text-cream/50">No billing data yet.</div>}
    </Card>
    <Card className="p-6">
      <h2 className="serif text-2xl text-brass mb-4">Recent Superbills</h2>
      {rows.slice(0,10).map(r=>(
        <div key={r.id} className="flex justify-between items-center py-2 border-b border-forest-600/30 last:border-0">
          <div><span className="font-medium">{r.mfl_clients?.first_name} {r.mfl_clients?.last_name}</span>
            <span className="text-cream/40 text-sm ml-2">DOS {r.dos}</span></div>
          <div className="flex items-center gap-4">
            <span className="serif text-brass">${Number(r.total).toFixed(2)}</span>
            <span className="text-xs px-2 py-1 rounded bg-forest-600/50 uppercase tracking-wide">{r.status}</span>
          </div>
        </div>
      ))}
      {rows.length===0 && <div className="text-cream/50">No superbills yet.</div>}
    </Card>
  </div>);
}

/* ===================== TOOLS ===================== */

  const [apptTime,setApptTime]=useState("2:00 PM");
  const [service,setService]=useState("Deep Tissue Massage");
  const [copied,setCopied]=useState(false);
  const [copiedWellness,setCopiedWellness]=useState(false);
  const [missedName,setMissedName]=useState("");
  const [copiedMissed,setCopiedMissed]=useState(false);

  const reminderText=`Hi ${firstName||"[Client name]"},

This is a friendly reminder from Desiree at Massage Fit Life — you have an appointment for ${service} on ${apptDate} at ${apptTime}.

If you need to reschedule, please let me know at least 24 hours in advance.

📍 4226 Old Road 37 #140, Lakeland, FL 33813
📞 (863) 812-6479

Looking forward to seeing you!
– Desiree Dekle, LMT`;

  const wellnessText=`Hi ${firstName||"[Client name]"},

Just checking in — it's been a while since your last session and I wanted to see how you're feeling.

If your body is ready for some relief, I'd love to get you back in. My calendar has some openings coming up.

Book online: https://massage-fit-life.vercel.app
📞 (863) 812-6479

Take care,
– Desiree Dekle, LMT | Massage Fit Life`;

I noticed you missed your appointment today. No worries — life happens!

Whenever you're ready to reschedule, I'm here.

Book online: https://massage-fit-life.vercel.app
📞 (863) 812-6479

– Desiree`;

  return(<div>

        <Field label="Service" value={service} onChange={e=>setService(e.target.value)}/>
        <Field label="Date" type="date" value={apptDate} onChange={e=>setApptDate(e.target.value)}/>
        <Field label="Time" value={apptTime} onChange={e=>setApptTime(e.target.value)} placeholder="2:00 PM"/>
      </div>
      <div className="bg-forest-900 border border-forest-600/40 rounded-lg p-4 text-xs text-cream/75 whitespace-pre-wrap font-mono leading-relaxed mb-4">{reminderText}</div>
      <Btn onClick={()=>copy(reminderText,setCopied)}>{copied?"✓ Copied!":"Copy Reminder"}</Btn>

    <Card className="p-6 mb-5">
      <h2 className="serif text-2xl text-brass mb-4">Wellness Check-In</h2>
      <p className="text-cream/60 text-sm mb-4">Re-engage a client you haven't seen in a while.</p>
      <Field label="Client first name" value={firstName} onChange={e=>setFirstName(e.target.value)} placeholder="Sarah"/>
      <div className="bg-forest-900 border border-forest-600/40 rounded-lg p-4 text-xs text-cream/75 whitespace-pre-wrap font-mono leading-relaxed mb-4">{wellnessText}</div>
      <Btn onClick={()=>copy(wellnessText,setCopiedWellness)}>{copiedWellness?"✓ Copied!":"Copy Check-In"}</Btn>
    </Card>

    <Card className="p-6">
      <h2 className="serif text-2xl text-brass mb-4">Missed Appointment Follow-Up</h2>
      <Field label="Client first name" value={missedName} onChange={e=>setMissedName(e.target.value)} placeholder="Sarah"/>
      <div className="bg-forest-900 border border-forest-600/40 rounded-lg p-4 text-xs text-cream/75 whitespace-pre-wrap font-mono leading-relaxed mb-4">{missedText}</div>
      <Btn onClick={()=>copy(missedText,setCopiedMissed)}>{copiedMissed?"✓ Copied!":"Copy Follow-Up"}</Btn>
    </Card>
  </div>);
}

/* ===================== PROVIDERS ===================== */
function ProvidersPage() {
  const [providers,setProvidersState]=useState(()=>getProviders());
  const [adding,setAdding]=useState(false);
  const [f,setF]=useState({name:"",credentials:"",npi:"",license:"",specialty:""});
  const save=()=>{
    const next=[...providers,{...f,id:Date.now().toString()}];
    setProvidersState(next); setProviders(next);
    setAdding(false); setF({name:"",credentials:"",npi:"",license:"",specialty:""});
  };
  const remove=id=>{
    const next=providers.filter(p=>p.id!==id);
    setProvidersState(next); setProviders(next);
  };
  return(<div>
    <div className="flex justify-between items-center mb-2">
      <div>
        <h1 className="serif text-4xl mb-1">Providers</h1>
        <p className="text-cream/60 mb-6">Manage independent contractors and their credentials. Selected provider appears on SOAP notes and superbills.</p>
      </div>
      <Btn onClick={()=>setAdding(!adding)}>{adding?"Cancel":"+ Add Contractor"}</Btn>
    </div>

    {/* Owner / default */}
    <Card className="p-5 mb-4 border border-brass/30">
      <div className="flex justify-between items-center">
        <div>
          <div className="font-medium text-cream">{PRACTICE.provider} <span className="ml-2 text-xs px-2 py-0.5 rounded bg-brass/20 text-brass">Owner</span></div>
          <div className="text-cream/50 text-sm mt-0.5">NPI: {PRACTICE.npi} · License: {PRACTICE.license}</div>
          <div className="text-cream/40 text-xs mt-0.5">{PRACTICE.email} · {PRACTICE.phone}</div>
        </div>
        <div className="text-xs text-cream/30">Default provider</div>
      </div>
    </Card>

    {adding&&<Card className="p-6 mb-5">
      <h3 className="serif text-xl text-brass mb-4">Add Independent Contractor</h3>
      <div className="grid grid-cols-2 gap-x-5">
        <Field label="Full name" value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="Jane Smith"/>
        <Field label="Credentials" value={f.credentials} onChange={e=>setF({...f,credentials:e.target.value})} placeholder="LMT, CMT, etc."/>
        <Field label="NPI number" value={f.npi} onChange={e=>setF({...f,npi:e.target.value})} placeholder="1234567890"/>
        <Field label="License number(s)" value={f.license} onChange={e=>setF({...f,license:e.target.value})} placeholder="MA12345"/>
      </div>
      <Field label="Specialty (optional)" value={f.specialty} onChange={e=>setF({...f,specialty:e.target.value})} placeholder="Sports, Prenatal, etc."/>
      <Btn onClick={save} disabled={!f.name}>Save Contractor</Btn>
    </Card>}

    {providers.length===0&&!adding&&<div className="text-cream/40 text-center py-12">No contractors added yet.</div>}
    {providers.map(p=>(
      <Card key={p.id} className="p-5 mb-3">
        <div className="flex justify-between items-start">
          <div>
            <div className="font-medium text-cream">{p.name}{p.credentials?" · "+p.credentials:""}</div>
            {(p.npi||p.license)&&<div className="text-cream/50 text-sm mt-0.5">{p.npi?"NPI: "+p.npi:""}{p.npi&&p.license?" · ":""}{p.license?"License: "+p.license:""}</div>}
            {p.specialty&&<div className="text-cream/40 text-xs mt-0.5">{p.specialty}</div>}
          </div>
          <Btn variant="ghost" onClick={()=>remove(p.id)} className="text-red-400/50 hover:text-red-400 text-sm">Remove</Btn>
        </div>
      </Card>
    ))}
  </div>);
}

/* ===================== ROOT ===================== */
function App() {
  const [session,setSession]=useState(null);
  const [ready,setReady]=useState(false);
  useEffect(()=>{ if(!sb){setReady(true);return;}
    sb.auth.getSession().then(({data})=>{setSession(data.session);setReady(true);});
    const {data:sub}=sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  const signOut=async()=>{ if(sb) await sb.auth.signOut(); setSession(null); };
  if(!ready) return <div className="min-h-screen flex items-center justify-center text-brass serif text-2xl">Loading…</div>;
  if(!session) return <Login onIn={()=>sb.auth.getSession().then(({data})=>setSession(data.session))}/>;
  return <Shell session={session} signOut={signOut}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
